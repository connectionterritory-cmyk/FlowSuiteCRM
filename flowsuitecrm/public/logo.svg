    <path d="M0 500 C90 350, 260 350, 320 320 
             C310 430, 160 430, 0 500 Z" fill="url(#goldGrad)"/>
  </g>

  <!-- Text -->
  <text x="700" y="470" font-family="Montserrat, Arial, sans-serif" 
        font-size="260" font-weight="700" fill="url(#blueGrad)">
        FlowSuite
  </text>
  <text x="1800" y="470" font-family="Montserrat, Arial, sans-serif" 
        font-size="260" font-weight="700" fill="url(#goldGrad)">
        CRM
  </text>
